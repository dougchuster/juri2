# =================================================================
# nginx/app.conf — Reverse Proxy para Sistema Jurídico ADV
# Substitua SEU_DOMINIO.com.br pelo domínio real antes do deploy
# =================================================================

# ── Upstream ─────────────────────────────────────────────────────
upstream juridico_app {
    server app:3000;
    keepalive 32;
}

upstream evolution_api {
    server evolution-api:8080;
    keepalive 16;
}

# ── HTTP: ACME challenge + redirect para HTTPS ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name adv.chuster.com.br www.adv.chuster.com.br;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name evolution.chuster.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name adv.chuster.com.br www.adv.chuster.com.br;

    # ── SSL Certificates (Let's Encrypt) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/adv.chuster.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adv.chuster.com.br/privkey.pem;

    # ── SSL Hardening ─────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security Headers ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Request limits ────────────────────────────────────────────
    client_max_body_size      50m;
    client_body_timeout       60s;
    client_header_timeout     30s;
    keepalive_timeout         65s;
    send_timeout              60s;

    # ── Gzip compression ──────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # ── WebSocket (Socket.io) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass             http://juridico_app;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
        proxy_connect_timeout  10s;
    }

    # ── Static Next.js assets (cache longa, imutáveis) ────────────
    location /_next/static/ {
        proxy_pass         http://juridico_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Uploads (servidos diretamente pelo nginx é mais eficiente) ─
    # Descomente se montar o volume no nginx também:
    # location /uploads/ {
    #     alias /app/public/uploads/;
    #     expires 30d;
    #     add_header Cache-Control "public";
    # }

    # ── App (todas as outras rotas) ───────────────────────────────
    location / {
        proxy_pass             http://juridico_app;
        proxy_http_version     1.1;
        proxy_set_header       Connection        "";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        proxy_send_timeout     120s;
        proxy_connect_timeout  10s;
        proxy_buffering        on;
        proxy_buffer_size      128k;
        proxy_buffers          4 256k;
        proxy_busy_buffers_size 256k;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name evolution.chuster.com.br;

    ssl_certificate     /etc/letsencrypt/live/adv.chuster.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adv.chuster.com.br/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;

    client_max_body_size      50m;
    client_body_timeout       60s;
    client_header_timeout     30s;
    keepalive_timeout         65s;
    send_timeout              60s;

    location / {
        proxy_pass             http://evolution_api;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        proxy_send_timeout     120s;
        proxy_connect_timeout  10s;
    }
}
