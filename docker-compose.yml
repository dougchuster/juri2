services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-juridico-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: juridico
      POSTGRES_PASSWORD: juridico123
      POSTGRES_DB: sistema_juridico
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: sistema-juridico-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
